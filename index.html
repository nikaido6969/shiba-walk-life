// ===================== デイリーストリーク =====================
function loadDailyStreak(){
  try{
    const raw=localStorage.getItem('shiba_daily_streak');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {count:0,lastDate:'',weekDays:[]};
}

function saveDailyStreak(data){
  try{localStorage.setItem('shiba_daily_streak',JSON.stringify(data));}catch(e){}
}

function updateDailyStreak(){
  const streak=loadDailyStreak();
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);

  if(streak.lastDate===today) return streak; // already counted today

  if(streak.lastDate===yesterday){
    streak.count++;
  }else if(streak.lastDate!==today){
    streak.count=1; // reset
  }
  streak.lastDate=today;

  // 今週の学習日を記録
  const dayOfWeek=new Date().getDay(); // 0=Sun
  if(!streak.weekDays) streak.weekDays=[];
  if(!streak.weekDays.includes(dayOfWeek)) streak.weekDays.push(dayOfWeek);
  // 月曜になったらリセット
  if(dayOfWeek===1 && streak.weekDays.length>1 && !streak.weekDays.includes(1)){
    streak.weekDays=[1];
  }

  saveDailyStreak(streak);
  return streak;
}

function renderStreakCard(){
  const streak=loadDailyStreak();
  const today=new Date().getDay();
  const dayNames=['日','月','火','水','木','金','土'];
  let weekHtml='';
  for(let i=0;i<7;i++){
    const isDone=streak.weekDays&&streak.weekDays.includes(i);
    const isToday=i===today;
    weekHtml+='<div class="streak-day'+(isDone?' done':'')+(isToday?' today':'')+'">'+dayNames[i]+'</div>';
  }
  return '<div class="streak-card">'+
    '<div class="streak-num">'+streak.count+'</div>'+
    '<div class="streak-label">日連続学習中！🔥</div>'+
    '<div class="streak-week">'+weekHtml+'</div>'+
    '</div>';
}

// 経験値 → レベル計算
function calcLevel(exp){
  // レベル1=0exp, レベル2=30exp, レベル3=80exp, ...
  const thresholds=[0,30,80,150,250,400,600,850,1200,1600,2100,2700,3500,4500,6000];
  let lv=1;
  for(let i=1;i<thresholds.length;i++){
    if(exp>=thresholds[i]) lv=i+1; else break;
  }
  const curThresh=thresholds[lv-1]||0;
  const nextThresh=thresholds[lv]||(curThresh+500);
  const pct=Math.min(100,Math.round((exp-curThresh)/(nextThresh-curThresh)*100));
  return {level:lv, exp, curThresh, nextThresh, pct};
}

function getLevelTitle(lv){
  const titles=['🐣ひよっこ','🐕わんこ初級','🐕わんこ中級','🌟学びの星','💪がんばり屋',
    '📖読書家','🏆チャンピオン','👑マスター','🔥レジェンド','✨天才','🌈究極マスター',
    '🎓博士','💎ダイヤモンド','🏅殿堂入り','👑全知全能'];
  return titles[Math.min(lv-1,titles.length-1)];
}

// クイズ結果を記録（showQuizResultから呼ばれる）
function recordQuizResult(subject,score,total,correctCount,wrongList){
  updateDailyStreak();
  const data=loadStudyData();
  data.totalQuizzes++;
  data.totalCorrect+=correctCount;
  data.totalAnswered+=total;

  // 経験値付与
  const expGain=score+correctCount*5+(correctCount===total?20:0);
  data.exp+=expGain;
  data.level=calcLevel(data.exp).level;

  // 科目別
  if(!data.subjects[subject]) data.subjects[subject]={correct:0,total:0};
  data.subjects[subject].correct+=correctCount;
  data.subjects[subject].total+=total;

  // 弱点記録
  wrongList.forEach(function(w){
    const existing=data.wrongQuestions.find(function(x){return x.q===w.q;});
    if(existing){existing.count++;}
    else{data.wrongQuestions.push({q:w.q,correctAns:w.correctAns,subj:subject,count:1});}
  });
  // 弱点は最新30件まで
  if(data.wrongQuestions.length>30) data.wrongQuestions=data.wrongQuestions.slice(-30);

  saveStudyData(data);

  // 履歴追加
  const hist=loadStudyHistory();
  const now=new Date();
  hist.push({
    date:now.toLocaleDateString('ja-JP',{month:'short',day:'numeric'})+' '+now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),
    subj:subject,score:score,total:total,correct:correctCount,expGain:expGain
  });
  saveStudyHistory(hist);

  return expGain;
}

// ===================== 出題履歴＆セッション管理 =====================
var sessionSeed = Date.now();
function seededRandom(seed) {
  var x = Math.sin(seed++) * 10000;
  return x - Math.floor(x);
}

// 出題済み問題を記録（セッション内で重複を防ぐ）
var askedQuestions = {};
function resetAskedQuestions() { askedQuestions = {}; }

// セッションごとに異なるシャッフル
function sessionShuffle(arr) {
  var result = arr.slice();
  var seed = sessionSeed;
  for (var i = result.length - 1; i > 0; i--) {
    seed++;
    var j = Math.floor(seededRandom(seed) * (i + 1));
    var tmp = result[i]; result[i] = result[j]; result[j] = tmp;
  }
  return result;
}

// 未出題の問題を優先して選ぶ
function pickUnaskedQuestions(pool, count, subj) {
  var key = subj || 'all';
  if (!askedQuestions[key]) askedQuestions[key] = [];
  var asked = askedQuestions[key];

  // 未出題を優先
  var unasked = [];
  var alreadyAsked = [];
  for (var i = 0; i < pool.length; i++) {
    var qText = pool[i].q || pool[i].en || '';
    if (asked.indexOf(qText) === -1) {
      unasked.push(pool[i]);
    } else {
      alreadyAsked.push(pool[i]);
    }
  }

  // 未出題をシャッフル
  var shuffled = sessionShuffle(unasked);

  // 足りなければ既出からも追加（全問出し切った場合）
  if (shuffled.length < count) {
    var extra = sessionShuffle(alreadyAsked);
    shuffled = shuffled.concat(extra);
  }

  var selected = shuffled.slice(0, count);

  // 出題済みに記録
  for (var j = 0; j < selected.length; j++) {
    var txt = selected[j].q || selected[j].en || '';
    if (asked.indexOf(txt) === -1) asked.push(txt);
  }
  askedQuestions[key] = asked;

  // 全問出し切ったらリセット
  if (asked.length >= pool.length) {
    askedQuestions[key] = [];
  }

  return selected;
}

// 科目ごとに問題プールを取得
function getQuizPool(subject){
  if(subject==='english') return engWords.map(function(w){return {q:w.en,choices:[w.ja],ans:0,subj:'english'};});
  if(subject==='math') return mathQuiz.map(function(q){return Object.assign({},q,{subj:'math'});});
  if(subject==='japanese') return japaneseQuiz.map(function(q){return Object.assign({},q,{subj:'japanese'});});
  if(subject==='science') return scienceQuiz.map(function(q){return Object.assign({},q,{subj:'science'});});
  if(subject==='social') return socialQuiz.map(function(q){return Object.assign({},q,{subj:'social'});});
  if(subject==='dog') return dogQuiz.map(function(q){return Object.assign({},q,{subj:'dog'});});
  // all: 全科目からランダムMix
  const all=[];
  all.push(...engWords.map(function(w){return {q:w.en,choices:[w.ja],ans:0,subj:'english'};}));
  all.push(...mathQuiz.map(function(q){return Object.assign({},q,{subj:'math'});}));
  all.push(...japaneseQuiz.map(function(q){return Object.assign({},q,{subj:'japanese'});}));
  all.push(...scienceQuiz.map(function(q){return Object.assign({},q,{subj:'science'});}));
  all.push(...socialQuiz.map(function(q){return Object.assign({},q,{subj:'social'});}));
  all.push(...dogQuiz.map(function(q){return Object.assign({},q,{subj:'dog'});}));
  return all;
}

function getSubjectLabel(subj){

  return m[subj]||'📚クイズ';
}
function getSubjectEmoji(subj){
  const m={'english':'🔤','math':'📐','japanese':'📖','science':'🔬','social':'🌍','dog':'🐕'};

    const wrongs=engWords.filter(w=>w.ja!==correctJa).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.ja);

    // シャッフル
    for(let i=shuffledChoices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));var tmp=shuffledChoices[i];shuffledChoices[i]=shuffledChoices[j];shuffledChoices[j]=tmp;}

function answerQuiz(idx){

  EQ.answered=true;
  clearInterval(EQ.timerId);
  const elapsed=Date.now()-EQ.startTime;
  const correct=(idx>=0 && idx===EQ.current.correctIdx);
  const correctIdx=EQ.current.correctIdx;

  const cBtn=document.getElementById('eq-c'+correctIdx);
  if(cBtn)cBtn.classList.add('correct');

  const res=document.getElementById('eq-result');
  if(correct){
    let grade,cls;
    if(elapsed<1500){grade='Excellent!';cls='ex';}
    else if(elapsed<3000){grade='Great!';cls='gr';}
    else if(elapsed<5000){grade='Good!';cls='gd';}
    else{grade='Good';cls='gd';}
    EQ.score+=elapsed<1500?20:elapsed<3000?15:10;
    EQ.streak++;
    if(EQ.streak>EQ.bestStreak)EQ.bestStreak=EQ.streak;
    if(res){res.textContent='⭕ '+grade;res.className='eq-result '+cls;}
    EQ.correctCount++;
    if(typeof playSE==='function')playSE('happy');
    // コンボフィーバー演出
    if(EQ.streak>=3){
      const fire=document.createElement('div');fire.className='combo-fire';
      fire.textContent=EQ.streak>=5?'🔥 '+EQ.streak+'連続！FEVER！':EQ.streak+'連続正解！🔥';
      document.body.appendChild(fire);setTimeout(function(){fire.remove();},800);
      if(EQ.streak>=5 && typeof playSE==='function')playSE('achieve');
    }
  }else{
    EQ.streak=0;
    const correctText=EQ.current.choices[correctIdx];
    EQ.wrongList.push({q:EQ.current.question,correctAns:correctText,subj:EQ.current.subj});
    // ハート減少
    EQ.hearts=Math.max(0,EQ.hearts-1);
    const heartEls=document.querySelectorAll('.eq-heart:not(.lost)');
    if(heartEls.length>0){const last=heartEls[heartEls.length-1];last.classList.add('breaking');setTimeout(function(){last.classList.add('lost');last.classList.remove('breaking');},500);}
    if(idx===-1){
      if(res){res.textContent='⏰ 時間切れ！ → '+correctText;res.className='eq-result bd';}
    }else{
      const wrong=document.getElementById('eq-c'+idx);
      if(wrong)wrong.classList.add('wrong');
      if(res){res.textContent='❌ → '+correctText;res.className='eq-result bd';}
    }
    if(typeof playSE==='function')playSE(300,0.1);
  }
  EQ.round++;
  // ハート0で終了 or 通常の次問題
  if(EQ.hearts<=0){
    setTimeout(function(){
      showQuizResult();
    },1500);
  }else{
    setTimeout(nextQuestion,1500);
  }
}

function getKoroAdvice(pct, bestStreak, hearts, subject){
  var cond = 'mid';
  if(hearts <= 0) cond = 'hearts0';
  else if(bestStreak >= 3) cond = 'combo';
  else if(pct >= 90) cond = 'high';
  else if(pct >= 70) cond = 'mid_high';
  else if(pct >= 50) cond = 'mid';
  else cond = 'low';

  // 苦手科目の場合は上書き
  var studyData = loadStudyData();
  if(subject && subject !== 'all'){
    var sd = studyData.subjects[subject];
    if(sd && sd.total >= 5 && (sd.correct/sd.total) < 0.5){
      cond = 'weak';
    }
  }

  // まず科目＋条件に合うものを探す
  var pool = [];
  var subKey = (subject && subject !== 'all') ? subject : null;
  for(var i=0;i<KORO_ADVICES.length;i++){
    var a = KORO_ADVICES[i];
    if(a.cond === cond && a.sub && a.sub === subKey) pool.push(a);
  }
  // 科目別がなければ汎用
  if(pool.length === 0){
    for(var i=0;i<KORO_ADVICES.length;i++){
      if(KORO_ADVICES[i].cond === cond && !KORO_ADVICES[i].sub) pool.push(KORO_ADVICES[i]);
    }
  }
  if(pool.length === 0) pool = [KORO_ADVICES[0]];
  // セッションごとに異なるアドバイスを出すため、最近表示したものを避ける
  var recent = [];
  try{ recent = JSON.parse(sessionStorage.getItem('koro_recent_adv')||'[]'); }catch(e){}
  var fresh = [];
  for(var i=0;i<pool.length;i++){
    if(recent.indexOf(pool[i].msg) === -1) fresh.push(pool[i]);
  }
  if(fresh.length > 0) pool = fresh;
  var chosen = pool[Math.floor(Math.random() * pool.length)];
  recent.push(chosen.msg);
  if(recent.length > 10) recent = recent.slice(-10);
  try{ sessionStorage.setItem('koro_recent_adv', JSON.stringify(recent)); }catch(e){}
  return chosen;
}

function renderKoroAdviceHTML(pct, bestStreak, hearts, subject){
  var advice = getKoroAdvice(pct, bestStreak, hearts, subject);
  var favs = loadKoroFavorites();
  var isFav = false;
  for(var i=0;i<favs.length;i++){ if(favs[i].msg === advice.msg){ isFav=true; break; } }
  var adviceJson = JSON.stringify({msg:advice.msg,tip:advice.tip}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  var h = '<div class="koro-advice" style="position:relative;">';
  h += '<button class="koro-fav-btn'+(isFav?' liked':'')+'" onclick="toggleKoroFav(this,&quot;'+adviceJson+'&quot;)">'+(isFav?'❤️':'🤍')+'</button>';
  h += '<div class="koro-advice-header">';
  h += '<div class="koro-advice-avatar">🐕</div>';
  h += '<div><span class="koro-advice-name">コロ先生</span><span class="koro-advice-tag">勉強アドバイス</span></div>';
  h += '</div>';
  h += '<div class="koro-advice-body">' + advice.msg + '</div>';
  h += '<div class="koro-advice-tip">' + advice.tip + '</div>';
  h += '</div>';
  return h;
}

// 日替わりで3つのコラムを選んで追加表示
function getDailyColumns(){
  var today = new Date();
  var dayOfYear = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
  var seed = dayOfYear * 13 + today.getFullYear() * 3;
  var indices = [];
  for(var i=0;i<KORO_DAILY_COLUMNS.length;i++) indices.push(i);
  for(var i=indices.length-1;i>0;i--){
    seed = (seed * 48271 + 11) & 0x7FFFFFFF;
    var j = seed % (i+1);
    var t=indices[i];indices[i]=indices[j];indices[j]=t;
  }
  return indices.slice(0,3).map(function(idx){return KORO_DAILY_COLUMNS[idx];});
}

function openKoroColumn(idx){
  var col = KORO_COLUMNS[idx];
  if(!col) return;

  // 既読にする
  var readList = loadColumnRead();
  if(readList.indexOf(idx) === -1){
    readList.push(idx);
    saveColumnRead(readList);
    // 全コラム読破ボーナス
    if(readList.length === KORO_COLUMNS.length){

      sd.exp += 50;

  h += '<div class="koro-detail-sub">コロ先生の勉強コラム #'+(idx+1)+'</div>';
  h += '<div class="koro-detail-body">'+col.body+'</div>';
  h += '<div style="margin-top:16px;text-align:center;">';

  document.getElementById('koro-detail-overlay').classList.add('show');

function closeKoroColumn(){
  document.getElementById('koro-detail-overlay').classList.remove('show');
  // 学習モード画面を再描画

    renderStudyScreen();
  }
}

// ===================== お気に入り管理 =====================
function loadKoroFavorites(){
  try{ var d=localStorage.getItem('koro_favorites'); return d?JSON.parse(d):[]; }catch(e){return [];}
}
function saveKoroFavorites(arr){
  try{ localStorage.setItem('koro_favorites',JSON.stringify(arr)); }catch(e){}
}
function toggleKoroFav(btn, jsonStr){
  try{
    var data = JSON.parse(jsonStr.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
    var favs = loadKoroFavorites();
    var found = -1;
    for(var i=0;i<favs.length;i++){ if(favs[i].msg === data.msg){ found=i; break; } }
    if(found >= 0){
      favs.splice(found,1);
      btn.innerHTML = '🤍';
      btn.classList.remove('liked');
    }else{
      data.savedAt = Date.now();
      favs.push(data);
      btn.innerHTML = '❤️';
      btn.classList.add('liked');
    }
    saveKoroFavorites(favs);
  }catch(e){}
}
function removeKoroFav(idx){
  var favs = loadKoroFavorites();
  favs.splice(idx,1);
  saveKoroFavorites(favs);
  renderStudyScreen();
}

function renderFavoritesHTML(){
  var favs = loadKoroFavorites();
  var h = '<div class="fav-folder">';
  h += '<h3>❤️ お気に入りアドバイス <span style="font-size:11px;color:#999;font-weight:normal;">('+favs.length+'件)</span></h3>';
  if(favs.length === 0){
    h += '<div class="fav-empty">アドバイスカードの🤍をタップして<br>お気に入りに保存しよう！</div>';
  }else{
    for(var i=0;i<favs.length;i++){
      h += '<div class="fav-card">';
      h += '<button class="fav-del" onclick="removeKoroFav('+i+')">✕</button>';
      h += '<div style="font-size:13px;margin-bottom:4px;">'+favs[i].msg+'</div>';
      h += '<div style="background:#fff;border-radius:8px;padding:6px 8px;font-size:11px;border-left:3px solid #FFB74D;">'+favs[i].tip+'</div>';
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

var koroNpc = {x:0, y:0, visible:false, knowledge:null, sessionKnowledge:[]};

function initKoroNpcSession(){
  // ログインごとにシャッフルしたナレッジリストを作成
  var arr = [];
  for(var i=0;i<KORO_KNOWLEDGE.length;i++) arr.push(i);
  // Fisher-Yatesシャッフル
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  koroNpc.sessionKnowledge = arr;
  koroNpc.sessionIdx = 0;
}
initKoroNpcSession();

function getNextKoroKnowledge(){
  if(koroNpc.sessionIdx >= koroNpc.sessionKnowledge.length) koroNpc.sessionIdx = 0;
  var idx = koroNpc.sessionKnowledge[koroNpc.sessionIdx];
  koroNpc.sessionIdx++;
  return KORO_KNOWLEDGE[idx];
}

function spawnKoroNpc(){
  koroNpc.x = 60 + Math.random() * (cW - 120);
  koroNpc.y = canvas.height * 0.38 + Math.random() * canvas.height * 0.25;
  koroNpc.visible = true;
  koroNpc.knowledge = getNextKoroKnowledge();
  koroNpc.floatPhase = Math.random() * Math.PI * 2;
}

function drawKoroNpc(){
  if(!koroNpc.visible) return;
  var x = koroNpc.x;
  var baseY = koroNpc.y;
  // ふわふわ浮遊アニメーション
  koroNpc.floatPhase += 0.03;
  var y = baseY + Math.sin(koroNpc.floatPhase) * 3;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(x, y + 28, 18, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // 体（丸い柴犬）
  ctx.fillStyle = '#D4A44A';
  ctx.beginPath();
  ctx.arc(x, y, 20, 0, Math.PI*2);
  ctx.fill();

  // お腹（白）
  ctx.fillStyle = '#FFF8E1';
  ctx.beginPath();
  ctx.arc(x, y+6, 13, 0, Math.PI*2);
  ctx.fill();

  // 耳
  ctx.fillStyle = '#C49030';
  ctx.beginPath();
  ctx.moveTo(x-14, y-14);
  ctx.lineTo(x-20, y-28);
  ctx.lineTo(x-6, y-18);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+14, y-14);
  ctx.lineTo(x+20, y-28);
  ctx.lineTo(x+6, y-18);
  ctx.fill();

  // 目
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x-6, y-4, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+6, y-4, 2.5, 0, Math.PI*2);
  ctx.fill();

  // メガネ（コロ先生の特徴！）
  ctx.strokeStyle = '#5D4037';
  ctx.lineWidth = 1.5;
  // 左レンズ
  ctx.beginPath();
  ctx.arc(x-6, y-4, 5, 0, Math.PI*2);
  ctx.stroke();
  // 右レンズ
  ctx.beginPath();
  ctx.arc(x+6, y-4, 5, 0, Math.PI*2);
  ctx.stroke();
  // ブリッジ
  ctx.beginPath();
  ctx.moveTo(x-1, y-4);
  ctx.lineTo(x+1, y-4);
  ctx.stroke();
  // テンプル
  ctx.beginPath();
  ctx.moveTo(x-11, y-4);
  ctx.lineTo(x-15, y-6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x+11, y-4);
  ctx.lineTo(x+15, y-6);
  ctx.stroke();

  // 鼻
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x, y+2, 2, 0, Math.PI*2);
  ctx.fill();

  // 口（にっこり）
  ctx.strokeStyle = '#5D4037';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y+4, 4, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  // 名前ラベル
  ctx.fillStyle = 'rgba(230,81,0,0.9)';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('コロ先生', x, y + 34);

  // キラキラエフェクト
  var sparkle = Math.sin(koroNpc.floatPhase * 2) * 0.5 + 0.5;
  ctx.fillStyle = 'rgba(255,183,77,' + (sparkle * 0.6) + ')';
  ctx.font = '8px sans-serif';
  ctx.fillText('✨', x - 22, y - 20);
  ctx.fillText('✨', x + 18, y - 16);
}

function talkKoroNpc(){
  if(!koroNpc.visible) return;
  var kn = koroNpc.knowledge || getNextKoroKnowledge();
  showKoroNpcBubble(kn);
  // 次のナレッジを準備
  koroNpc.knowledge = getNextKoroKnowledge();
}

function showKoroNpcBubble(kn){
  var favs = loadKoroFavorites();
  var isFav = false;
  for(var i=0;i<favs.length;i++){ if(favs[i].msg === kn.title){ isFav=true; break; } }
  var favJson = JSON.stringify({msg:kn.title,tip:kn.body}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');

  var overlay = document.getElementById('koro-npc-overlay');
  var bubble = document.getElementById('koro-npc-bubble');
  if(!overlay||!bubble) return;

  var catLabel = {english:'英語',math:'数学',japanese:'国語',science:'理科',social:'社会',dog:'犬の豆知識',study:'勉強法'}[kn.cat] || '豆知識';

  var h = '<div class="knb-header">';
  h += '<div class="knb-avatar">🐕</div>';
  h += '<div><span class="knb-name">コロ先生</span><span class="knb-tag">'+catLabel+'</span></div>';
  h += '<button class="koro-fav-btn'+(isFav?' liked':'')+'" style="position:absolute;top:12px;right:12px;" onclick="toggleKoroFav(this,&quot;'+favJson+'&quot;)">'+(isFav?'❤️':'🤍')+'</button>';
  h += '</div>';
  h += '<div class="knb-body"><b>'+kn.title+'</b></div>';
  h += '<div class="knb-tip">'+kn.body+'</div>';
  h += '<div style="text-align:center;display:flex;gap:8px;justify-content:center;">';
  h += '<button class="mbtn" onclick="nextKoroNpcTip()" style="font-size:13px;">次のナレッジ ›</button>';
  h += '<button class="mbtn" style="background:#8D6E63;font-size:13px;" onclick="closeKoroNpcBubble()">とじる</button>';
  h += '</div>';

  bubble.innerHTML = h;
  overlay.classList.add('show');
}

function nextKoroNpcTip(){
  var kn = getNextKoroKnowledge();
  showKoroNpcBubble(kn);
}

function closeKoroNpcBubble(){
  var overlay = document.getElementById('koro-npc-overlay');
  if(overlay) overlay.classList.remove('show');
}



function showQuizResult(){
  clearInterval(EQ.timerId);
  const pct=Math.round(EQ.score/(EQ.total*20)*100);
  let emoji='🎉',msg='すごい！'+EQ.subjectLabel+'マスター！';
  if(pct<30){emoji='😢';msg='もう少しがんばろう！';}
  else if(pct<60){emoji='😊';msg='いい調子！続けよう！';}
  else if(pct<80){emoji='👏';msg='なかなかやるね！';}

  const coins=Math.max(5,Math.round(EQ.score/3));
  G.coins+=coins;
  if(typeof updateUI==='function')updateUI();

  // 学習データ記録
  const expGain=recordQuizResult(EQ.quizSubject,EQ.score,EQ.total,EQ.correctCount,EQ.wrongList);
  const studyData=loadStudyData();
  const lv=calcLevel(studyData.exp);

  document.getElementById('eq-box').innerHTML=
    '<div class="eq-finish">'+
    '<div class="eq-finish-emoji">'+emoji+'</div>'+
    '<div class="eq-finish-title">'+msg+'</div>'+
    '<div class="eq-finish-sub">'+(EQ.npcName?EQ.npcName+'との':'')+EQ.subjectLabel+'クイズ終了！</div>'+
    '<div class="eq-detail-stats">'+
    '<div class="eq-ds"><div class="eq-ds-num">'+EQ.correctCount+'/'+EQ.total+'</div><div class="eq-ds-label">正解数</div></div>'+
    '<div class="eq-ds"><div class="eq-ds-num">'+EQ.score+'</div><div class="eq-ds-label">スコア</div></div>'+
    '<div class="eq-ds"><div class="eq-ds-num">'+EQ.bestStreak+'</div><div class="eq-ds-label">最大連続</div></div>'+
    '<div class="eq-ds"><div class="eq-ds-num">+'+coins+'</div><div class="eq-ds-label">コイン</div></div>'+
    '</div>'+
    '<div class="eq-exp-gain">✨ <span>+'+expGain+' EXP</span> 獲得！ (Lv.'+lv.level+' '+getLevelTitle(lv.level)+')</div>'+
    renderKoroAdviceHTML(pct, EQ.bestStreak, EQ.hearts, EQ.quizSubject)+'<button class="mbtn" onclick="closeEngQuiz()">もどる</button>'+
    '</div>';
}

}

  {name:'ラーニングピラミッド活用法',origin:'NTLインスティチュート',body:'<b>講義5%→読書10%→視聴20%→実演30%→議論50%→実践75%→教える90%</b>と記憶定着率が変わる。能動的学習を増やす。'},

// コロ大大先生NPC状態
var koroDaiNpc = {x:0, y:0, visible:false, method:null, floatPhase:0, wingPhase:0};

// 日替わりで5メソッドを選ぶ
function getDailyExtraMethods(){
  var today = new Date();
  var dayOfYear = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
  var seed = dayOfYear * 7 + today.getFullYear();
  var indices = [];
  for(var i=0;i<DAILY_EXTRA_METHODS.length;i++) indices.push(i);
  // シード付きシャッフル
  for(var i=indices.length-1;i>0;i--){
    seed = (seed * 16807 + 12345) & 0x7FFFFFFF;
    var j = seed % (i+1);
    var t=indices[i];indices[i]=indices[j];indices[j]=t;
  }
  return indices.slice(0,5).map(function(idx){return DAILY_EXTRA_METHODS[idx];});
}

// 全メソッドプール（基本55 + 日替わり5 = 60）
function getAllStudyMethods(){
  return STUDY_METHODS.concat(getDailyExtraMethods());
}

var koroDaiSession = {pool:[], idx:0};
function initKoroDaiSession(){
  var all = getAllStudyMethods();
  var arr = [];
  for(var i=0;i<all.length;i++) arr.push(i);
  // シャッフル
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  koroDaiSession.pool = arr;
  koroDaiSession.idx = 0;
  koroDaiSession.allMethods = all;
}
initKoroDaiSession();

function getNextStudyMethod(){
  if(koroDaiSession.idx >= koroDaiSession.pool.length) koroDaiSession.idx = 0;
  var idx = koroDaiSession.pool[koroDaiSession.idx];
  koroDaiSession.idx++;
  return koroDaiSession.allMethods[idx];
}

// コロ大大先生は公園エリアにのみ出現
function spawnKoroDaiNpc(){
  if(areas[G.areaIdx].id !== 'park'){
    koroDaiNpc.visible = false;
    return;
  }
  koroDaiNpc.x = 80 + Math.random() * (cW - 160);
  koroDaiNpc.y = canvas.height * 0.32 + Math.random() * canvas.height * 0.15;
  koroDaiNpc.visible = true;
  koroDaiNpc.method = getNextStudyMethod();
  koroDaiNpc.floatPhase = Math.random() * Math.PI * 2;
  koroDaiNpc.wingPhase = 0;
}

// コロ大大先生描画（天使の羽根＋輪っか付き柴犬）
function drawKoroDaiNpc(){
  if(!koroDaiNpc.visible) return;
  var x = koroDaiNpc.x;
  var baseY = koroDaiNpc.y;
  // ゆっくり浮遊
  koroDaiNpc.floatPhase += 0.025;
  koroDaiNpc.wingPhase += 0.08;
  var y = baseY + Math.sin(koroDaiNpc.floatPhase) * 5;

  // 神々しい光オーラ
  var glowAlpha = 0.15 + Math.sin(koroDaiNpc.floatPhase * 1.5) * 0.1;
  var glow = ctx.createRadialGradient(x, y, 5, x, y, 45);
  glow.addColorStop(0, 'rgba(206,147,216,' + glowAlpha + ')');
  glow.addColorStop(0.5, 'rgba(186,104,200,' + (glowAlpha*0.5) + ')');
  glow.addColorStop(1, 'rgba(156,39,176,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 45, 0, Math.PI*2);
  ctx.fill();

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 35, 20, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // ===== 天使の羽根（左） =====
  var wingAngle = Math.sin(koroDaiNpc.wingPhase) * 0.15;
  ctx.save();
  ctx.translate(x - 18, y - 5);
  ctx.rotate(-0.3 + wingAngle);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-22, -18, -8, -30);
  ctx.quadraticCurveTo(-2, -20, 0, -10);
  ctx.quadraticCurveTo(-18, -12, -6, -24);
  ctx.quadraticCurveTo(0, -15, 2, -5);
  ctx.closePath();
  ctx.fill();
  // 羽根のハイライト
  ctx.strokeStyle = 'rgba(206,147,216,0.4)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();

  // ===== 天使の羽根（右） =====
  ctx.save();
  ctx.translate(x + 18, y - 5);
  ctx.rotate(0.3 - wingAngle);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(22, -18, 8, -30);
  ctx.quadraticCurveTo(2, -20, 0, -10);
  ctx.quadraticCurveTo(18, -12, 6, -24);
  ctx.quadraticCurveTo(0, -15, -2, -5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(206,147,216,0.4)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();

  // ===== 天使の輪っか（ヘイロー） =====
  ctx.save();
  ctx.translate(x, y - 30);
  ctx.scale(1, 0.35);
  ctx.strokeStyle = '#FFD54F';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#FFD54F';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // 体（神秘的な柴犬 やや大きめ）
  ctx.fillStyle = '#C8A04A';
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI*2);
  ctx.fill();

  // お腹（白）
  ctx.fillStyle = '#FFF8E1';
  ctx.beginPath();
  ctx.arc(x, y+7, 14, 0, Math.PI*2);
  ctx.fill();

  // 耳
  ctx.fillStyle = '#B08830';
  ctx.beginPath();
  ctx.moveTo(x-15, y-16);
  ctx.lineTo(x-22, y-32);
  ctx.lineTo(x-7, y-20);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+15, y-16);
  ctx.lineTo(x+22, y-32);
  ctx.lineTo(x+7, y-20);
  ctx.fill();

  // 目（知的で穏やかな目）
  ctx.fillStyle = '#4A148C';
  ctx.beginPath();
  ctx.arc(x-7, y-4, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+7, y-4, 2.5, 0, Math.PI*2);
  ctx.fill();
  // 目のハイライト
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x-6, y-5, 1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+8, y-5, 1, 0, Math.PI*2);
  ctx.fill();

  // 鼻
  ctx.fillStyle = '#4A148C';
  ctx.beginPath();
  ctx.arc(x, y+3, 2.2, 0, Math.PI*2);
  ctx.fill();

  // 口（にっこり）
  ctx.strokeStyle = '#6A1B9A';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y+5, 4, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  // 名前ラベル
  ctx.fillStyle = 'rgba(106,27,154,0.9)';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('コロ大大先生', x, y + 38);

  // キラキラエフェクト（紫系）
  var sp = Math.sin(koroDaiNpc.floatPhase * 2) * 0.5 + 0.5;
  ctx.fillStyle = 'rgba(206,147,216,' + (sp * 0.7) + ')';
  ctx.font = '9px sans-serif';
  ctx.fillText('✨', x - 28, y - 22);
  ctx.fillText('✨', x + 24, y - 18);
  ctx.fillText('🌟', x - 15, y - 35);
}

// コロ大大先生タップ処理
function talkKoroDaiNpc(){
  if(!koroDaiNpc.visible) return;
  var m = koroDaiNpc.method || getNextStudyMethod();
  showKoroDaiBubble(m);
  koroDaiNpc.method = getNextStudyMethod();
}

function showKoroDaiBubble(m){
  var favs = loadKoroFavorites();
  var isFav = false;
  for(var i=0;i<favs.length;i++){ if(favs[i].msg === m.name){ isFav=true; break; } }
  var favJson = JSON.stringify({msg:m.name,tip:m.body}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');

  var overlay = document.getElementById('korodai-npc-overlay');
  var bubble = document.getElementById('korodai-npc-bubble');
  if(!overlay||!bubble) return;

  var dailyInfo = getDailyExtraMethods();
  var dailyNames = dailyInfo.map(function(d){return d.name;}).join('、');

  var h = '<div class="korodai-header">';
  h += '<div class="korodai-avatar">🐕</div>';
  h += '<div><span class="korodai-name">コロ大大先生</span><span class="korodai-tag">勉強法</span></div>';
  h += '<button class="koro-fav-btn'+(isFav?' liked':'')+'" style="position:absolute;top:12px;right:12px;" onclick="toggleKoroFav(this,&quot;'+favJson+'&quot;)">'+(isFav?'❤️':'🤍')+'</button>';
  h += '</div>';
  h += '<div class="korodai-method">📖 '+m.name+'</div>';
  h += '<div class="korodai-origin">💡 '+m.origin+'</div>';
  h += '<div class="korodai-body">'+m.body+'</div>';
  h += '<div class="korodai-daily">📅 今日の日替わり勉強法：'+dailyNames.substring(0,40)+'…</div>';
  h += '<div style="text-align:center;display:flex;gap:8px;justify-content:center;margin-top:12px;">';
  h += '<button class="mbtn" style="background:linear-gradient(135deg,#AB47BC,#7B1FA2);" onclick="nextKoroDaiTip()">次の勉強法 ›</button>';
  h += '<button class="mbtn" style="background:#8D6E63;" onclick="closeKoroDaiBubble()">とじる</button>';
  h += '</div>';

  bubble.innerHTML = h;
  overlay.classList.add('show');
}

function nextKoroDaiTip(){
  var m = getNextStudyMethod();
  showKoroDaiBubble(m);
}

function closeKoroDaiBubble(){
  var overlay = document.getElementById('korodai-npc-overlay');
  if(overlay) overlay.classList.remove('show');
}

</script>
